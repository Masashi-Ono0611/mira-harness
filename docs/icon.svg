<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 120 120" role="img" aria-label="mira-harness cat mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF7FE"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg)"/>
  <!-- shadow + tail -->
  <ellipse cx="60" cy="106" rx="24" ry="5" fill="#0098EA" opacity="0.16"/>
  <path d="M86 90 q20 2 16 -18" fill="none" stroke="#0098EA" stroke-width="8" stroke-linecap="round"/>
  <!-- body -->
  <rect x="28" y="26" width="64" height="68" rx="32" fill="#0098EA"/>
  <ellipse cx="48" cy="93" rx="8" ry="5" fill="#0077C0"/>
  <ellipse cx="72" cy="93" rx="8" ry="5" fill="#0077C0"/>
  <!-- ears -->
  <path d="M34 32 L33 9 L53 25 Z" fill="#0098EA"/>
  <path d="M86 32 L87 9 L67 25 Z" fill="#0098EA"/>
  <path d="M38 28 L37 16 L49 25 Z" fill="#CFEBFB"/>
  <path d="M82 28 L83 16 L71 25 Z" fill="#CFEBFB"/>
  <ellipse cx="46" cy="38" rx="11" ry="6" fill="#fff" opacity="0.15"/>
  <!-- whiskers -->
  <g stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.9">
    <line x1="36" y1="53" x2="17" y2="50"/>
    <line x1="36" y1="57" x2="15" y2="58"/>
    <line x1="84" y1="53" x2="103" y2="50"/>
    <line x1="84" y1="57" x2="105" y2="58"/>
  </g>
  <!-- face -->
  <circle cx="48" cy="46" r="7" fill="#fff"/>
  <circle cx="72" cy="46" r="7" fill="#fff"/>
  <circle cx="49.4" cy="47" r="3.1" fill="#0B5E8E"/>
  <circle cx="73.4" cy="47" r="3.1" fill="#0B5E8E"/>
  <circle cx="48.1" cy="45.3" r="1.1" fill="#fff"/>
  <circle cx="72.1" cy="45.3" r="1.1" fill="#fff"/>
  <path d="M60 52 L63.5 56 L56.5 56 Z" fill="#FFB3C1"/>
  <path d="M60 56 q-4.5 6 -9 2.5" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M60 56 q4.5 6 9 2.5" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
