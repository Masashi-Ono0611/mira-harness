name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      # Publish hygiene: validate package.json/exports/files (publint) and that the
      # types resolve across module systems (attw; ESM-only by design, so the CJS
      # require path is intentionally ignored).
      - run: bun run check:publish
      # Advisory AI-slop scan (never blocks — surfaces the score in the log).
      - run: bun run slop
      # Smoke: the published artifacts must run on plain Node — consumers use npx /
      # node, never bun. Guards the "bun-first dev, Node-compatible output" contract:
      # the CLI is fully executed; both bins + the library entry are Node-parseable.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node dist/cli.js --version
      - run: node --check dist/mcp.js
      - run: node --check dist/index.js
