name: CI

on:
  push:
    branches: [main]
  pull_request:

# Run the JS actions (checkout/setup-node) on Node 24 now, ahead of GitHub's
# 2026-06-16 default switch — silences the Node 20 deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
